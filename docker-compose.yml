services:
  web:
    image: ${IMAGE_NAME:-alterbase:latest}
    build: .
    platform: ${CONTAINER_PLATFORM:-linux/amd64}
    container_name: alterbase
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8000}:80"
    volumes:
      - ${SYNOLOGY_HTDOCS_PATH:-./htdocs}:/var/www/html/htdocs
    environment:
      TZ: ${TZ:-UTC}
    network_mode: bridge